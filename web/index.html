<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.json">
<title>藏经阁</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

@font-face {
  font-family: 'LXGW WenKai';
  src: local('LXGW WenKai'), local('LXGWWenKai-Regular');
}

:root {
  --bg: #0d1117;
  --text: #e6edf3;
  --accent: #79c0ff;
  --dim: #5a6a7a;
  --card-bg: rgba(22, 27, 34, 0.85);
  --card-border: rgba(121, 192, 255, 0.12);
  --card-hover-border: rgba(121, 192, 255, 0.35);
  --modal-bg: rgba(13, 17, 23, 0.95);
  --input-bg: rgba(30, 37, 46, 0.9);
  --input-border: rgba(121, 192, 255, 0.2);
  --btn-bg: rgba(121, 192, 255, 0.15);
  --danger: #f47067;
  --success: #56d364;
}

html, body {
  width: 100%; height: 100%;
  font-family: 'LXGW WenKai', 'Noto Serif SC', 'SimSun', serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

canvas#starfield {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0; pointer-events: none;
}

.app {
  position: relative; z-index: 1;
  min-height: 100vh;
  padding: 2rem 1.5rem 4rem;
  max-width: 1100px;
  margin: 0 auto;
}

/* Title */
.app-title {
  text-align: center;
  font-size: 2.6rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  margin-bottom: 2.5rem;
  color: var(--accent);
  text-shadow: 0 0 20px rgba(121, 192, 255, 0.5), 0 0 60px rgba(121, 192, 255, 0.2);
  animation: titleGlow 3s ease-in-out infinite alternate;
  user-select: none;
}

@keyframes titleGlow {
  from { text-shadow: 0 0 20px rgba(121,192,255,0.5), 0 0 60px rgba(121,192,255,0.15); }
  to   { text-shadow: 0 0 30px rgba(121,192,255,0.7), 0 0 80px rgba(121,192,255,0.3); }
}

/* Toolbar */
.toolbar {
  display: flex; justify-content: flex-end;
  margin-bottom: 1.5rem;
}

.btn {
  font-family: inherit;
  font-size: 0.95rem;
  padding: 0.55rem 1.3rem;
  border: 1px solid var(--card-border);
  border-radius: 8px;
  background: var(--btn-bg);
  color: var(--accent);
  cursor: pointer;
  transition: all 0.25s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.btn:hover { background: rgba(121,192,255,0.25); border-color: var(--card-hover-border); }
.btn:active { transform: scale(0.97); }

.btn-sm {
  font-size: 0.78rem;
  padding: 0.3rem 0.7rem;
  border-radius: 6px;
}

.btn-danger {
  color: var(--danger);
  border-color: rgba(244,112,103,0.2);
  background: rgba(244,112,103,0.08);
}
.btn-danger:hover { background: rgba(244,112,103,0.18); border-color: rgba(244,112,103,0.4); }

/* Grid */
.book-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1.2rem;
  justify-items: center;
}

/* Card */
.book-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 1.3rem 1.4rem;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  width: 350px;
}
.book-card:hover {
  border-color: var(--card-hover-border);
  box-shadow: 0 0 24px rgba(121,192,255,0.08);
  transform: translateY(-2px);
}

.book-card .book-name {
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 0.5rem;
  line-height: 1.4;
}

.book-card .book-author {
  font-size: 0.88rem;
  color: var(--dim);
  margin-bottom: 0.7rem;
}

.book-card .book-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.book-card .book-progress {
  font-size: 0.85rem;
  color: var(--accent);
  opacity: 0.85;
}

.book-card .book-chapters {
  font-size: 0.82rem;
  color: var(--dim);
}

.book-card .card-actions {
  display: flex; gap: 0.5rem;
  margin-top: 0.9rem;
}

/* Progress bar */
.progress-bar-wrap {
  width: 100%;
  height: 4px;
  background: rgba(121,192,255,0.1);
  border-radius: 2px;
  margin-top: 0.8rem;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 4rem 1rem;
  color: var(--dim);
  font-size: 1.05rem;
}

/* Modal overlay */
.modal-overlay {
  position: fixed; inset: 0;
  z-index: 100;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.modal-overlay.active { opacity: 1; pointer-events: auto; }

.modal {
  background: var(--modal-bg);
  border: 1px solid var(--card-border);
  border-radius: 14px;
  padding: 2rem 2rem 1.6rem;
  width: 92%; max-width: 440px;
  transform: translateY(20px) scale(0.97);
  transition: transform 0.3s;
}
.modal-overlay.active .modal { transform: translateY(0) scale(1); }

.modal-title {
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 1.5rem;
  text-align: center;
}

.form-group {
  margin-bottom: 1rem;
}
.form-group label {
  display: block;
  font-size: 0.88rem;
  color: var(--dim);
  margin-bottom: 0.35rem;
}
.form-group input {
  width: 100%;
  font-family: inherit;
  font-size: 0.95rem;
  padding: 0.6rem 0.85rem;
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: 8px;
  color: var(--text);
  outline: none;
  transition: border-color 0.25s;
}
.form-group input:focus { border-color: var(--accent); }
.form-group input::placeholder { color: var(--dim); opacity: 0.6; }

.modal-actions {
  display: flex; gap: 0.8rem;
  margin-top: 1.4rem;
}
.modal-actions .btn { flex: 1; text-align: center; }

.btn-primary {
  background: rgba(121,192,255,0.2);
  color: var(--accent);
  font-weight: 600;
}
.btn-primary:hover { background: rgba(121,192,255,0.32); }

.btn-ghost {
  background: transparent;
  color: var(--dim);
  border-color: rgba(90,106,122,0.3);
}
.btn-ghost:hover { background: rgba(90,106,122,0.12); }

/* Crawl status */
.crawl-status {
  margin-top: 1.2rem;
  padding: 0.9rem;
  background: rgba(30,37,46,0.7);
  border-radius: 8px;
  font-size: 0.88rem;
  color: var(--dim);
  display: none;
}
.crawl-status.active { display: block; }
.crawl-status .status-text { margin-bottom: 0.5rem; }
.crawl-status .crawl-progress-bar {
  width: 100%; height: 6px;
  background: rgba(121,192,255,0.1);
  border-radius: 3px; overflow: hidden;
}
.crawl-status .crawl-progress-fill {
  height: 100%; width: 0;
  background: linear-gradient(90deg, var(--accent), var(--success));
  border-radius: 3px;
  transition: width 0.3s;
}

/* Toast */
.toast {
  position: fixed; bottom: 2rem; left: 50%;
  transform: translateX(-50%) translateY(20px);
  z-index: 200;
  padding: 0.7rem 1.5rem;
  border-radius: 8px;
  font-size: 0.9rem;
  color: var(--text);
  background: rgba(30,37,46,0.95);
  border: 1px solid var(--card-border);
  backdrop-filter: blur(6px);
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { border-color: rgba(86,211,100,0.4); }
.toast.error { border-color: rgba(244,112,103,0.4); }

/* Responsive */
@media (max-width: 700px) {
  .app { padding: 1.2rem 1rem 3rem; }
  .app-title { font-size: 2rem; margin-bottom: 1.8rem; }
  .book-grid { grid-template-columns: 1fr; gap: 1rem; }
  .modal { padding: 1.5rem 1.3rem 1.3rem; }
}
@media (min-width: 1000px) {
  .book-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>
<canvas id="starfield"></canvas>

<div class="app">
  <h1 class="app-title">藏经阁</h1>

  <div class="toolbar">
    <button class="btn" onclick="openModal()">添加新书</button>
  </div>

  <div id="bookGrid" class="book-grid"></div>
  <div id="emptyState" class="empty-state" style="display:none;">书架空空如也，添加一本书开始阅读吧</div>
</div>

<!-- Add Book Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="onOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">添加新书</div>
    <div class="form-group">
      <label>书名</label>
      <input type="text" id="inputName" placeholder="输入书名" autocomplete="off">
    </div>
    <div class="form-group">
      <label>书籍ID</label>
      <input type="number" id="inputBookId" placeholder="输入书籍ID" min="1">
    </div>
    <div class="form-group">
      <label>起始章节</label>
      <input type="number" id="inputStart" value="1" min="1">
    </div>
    <div class="form-group">
      <label>结束章节</label>
      <input type="number" id="inputEnd" placeholder="输入结束章节号" min="1">
    </div>
    <div class="form-group">
      <label>API地址</label>
      <input type="text" id="inputApi" value="https://apibi.cc/api/chapter" autocomplete="off">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="btnSubmit" onclick="submitBook()">提交</button>
    </div>
    <div class="crawl-status" id="crawlStatus">
      <div class="status-text" id="crawlText">准备中...</div>
      <div class="crawl-progress-bar"><div class="crawl-progress-fill" id="crawlFill"></div></div>
    </div>
  </div>
</div>

<!-- Clean Watermark Modal -->
<div class="modal-overlay" id="cleanModal" onclick="onCleanOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">清除水印</div>
    <div class="form-group">
      <label>自定义水印（每行一个）</label>
      <textarea id="inputWatermarks" placeholder="输入要删除的水印文字，每行一个&#10;例如：&#10;笔趣阁&#10;www.biquge.com&#10;本章未完" style="width:100%;min-height:120px;font-family:inherit;font-size:0.95rem;padding:0.6rem 0.85rem;background:var(--input-bg);border:1px solid var(--input-border);border-radius:8px;color:var(--text);outline:none;resize:vertical;"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeCleanModal()">取消</button>
      <button class="btn btn-primary" id="btnClean" onclick="submitClean()">清除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---- Starfield ---- */
(function initStarfield() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];
  const COUNT = 180;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function createStars() {
    stars = [];
    for (let i = 0; i < COUNT; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.4 + 0.3,
        a: Math.random(),
        da: (Math.random() - 0.5) * 0.008
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const s of stars) {
      s.a += s.da;
      if (s.a <= 0.1 || s.a >= 1) s.da = -s.da;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(230,237,243,' + s.a.toFixed(2) + ')';
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); createStars(); });
  resize();
  createStars();
  draw();
})();

/* ---- State ---- */
let books = [];
let crawlTimer = null;

/* ---- Toast ---- */
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => { t.className = 'toast'; }, 2600);
}

/* ---- Modal ---- */
function openModal() {
  document.getElementById('modalOverlay').classList.add('active');
  document.getElementById('inputName').focus();
  resetCrawlStatus();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  stopCrawlPoll();
  resetCrawlStatus();
}

function onOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function resetCrawlStatus() {
  const cs = document.getElementById('crawlStatus');
  cs.classList.remove('active');
  document.getElementById('crawlFill').style.width = '0';
  document.getElementById('crawlText').textContent = '准备中...';
  document.getElementById('btnSubmit').disabled = false;
  document.getElementById('btnSubmit').textContent = '提交';
}

/* ---- API ---- */
async function loadBooks() {
  try {
    const res = await fetch('/api/books');
    if (!res.ok) throw new Error(res.statusText);
    books = await res.json();
    renderBooks();
  } catch (e) {
    console.error('加载书架失败:', e);
    document.getElementById('emptyState').style.display = 'block';
  }
}

function renderBooks() {
  const grid = document.getElementById('bookGrid');
  const empty = document.getElementById('emptyState');

  if (!books || books.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  grid.innerHTML = books.map(b => {
    const total = b.chapter_count || 0;
    const prog = b.progress || {};
    const read = prog.chapter != null ? prog.chapter + 1 : 0;
    const pct = total > 0 ? Math.min(100, (read / total * 100)).toFixed(1) : 0;
    const author = b.author || '未知作者';
    return `
      <div class="book-card" onclick="goRead('${b.id}')" title="点击阅读">
        <div class="book-name">${esc(b.name || '未命名')}</div>
        <div class="book-author">${esc(author)}</div>
        <div class="book-meta">
          <span class="book-progress">已读 ${read}/${total} 章</span>
          <span class="book-chapters">共 ${total} 章</span>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" style="width:${pct}%"></div>
        </div>
        <div class="card-actions">
          <button class="btn btn-sm btn-danger" onclick="openCleanModal(event, '${b.id}')">清除水印</button>
        </div>
      </div>`;
  }).join('');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function goRead(id) {
  window.location.href = '/read/' + id;
}

let currentCleanBookId = null;

function openCleanModal(e, id) {
  e.stopPropagation();
  currentCleanBookId = id;
  document.getElementById('inputWatermarks').value = '';
  document.getElementById('cleanModal').classList.add('active');
}

function closeCleanModal() {
  document.getElementById('cleanModal').classList.remove('active');
  currentCleanBookId = null;
}

function onCleanOverlayClick(e) {
  if (e.target.id === 'cleanModal') {
    closeCleanModal();
  }
}

async function submitClean() {
  if (!currentCleanBookId) return;

  const textarea = document.getElementById('inputWatermarks');
  const watermarks = textarea.value
    .split('\n')
    .map(line => line.trim())
    .filter(line => line.length > 0);

  if (watermarks.length === 0) {
    showToast('请输入至少一个水印', 'error');
    return;
  }

  const btn = document.getElementById('btnClean');
  btn.disabled = true;
  btn.textContent = '处理中...';

  try {
    const res = await fetch('/api/books/' + currentCleanBookId + '/clean', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ watermarks: watermarks })
    });
    const data = await res.json();
    if (res.ok) {
      showToast('水印清除完成，移除 ' + (data.removed || 0) + ' 处', 'success');
      closeCleanModal();
    } else {
      showToast(data.msg || '清除失败', 'error');
    }
  } catch (err) {
    showToast('请求失败: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '清除';
  }
}

async function submitBook() {
  const name = document.getElementById('inputName').value.trim();
  const bookId = document.getElementById('inputBookId').value.trim();
  const start = document.getElementById('inputStart').value.trim();
  const end = document.getElementById('inputEnd').value.trim();
  const api = document.getElementById('inputApi').value.trim();

  if (!name) { showToast('请输入书名', 'error'); return; }
  if (!bookId) { showToast('请输入书籍ID', 'error'); return; }
  if (!end) { showToast('请输入结束章节', 'error'); return; }

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.textContent = '提交中...';

  try {
    const res = await fetch('/api/books/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: name,
        book_id: parseInt(bookId),
        chapter_start: parseInt(start) || 1,
        chapter_end: parseInt(end),
        api_url: api
      })
    });

    const data = await res.json();
    if (!res.ok) {
      showToast(data.msg || '添加失败', 'error');
      btn.disabled = false;
      btn.textContent = '提交';
      return;
    }

    showToast('已开始抓取', 'success');
    startCrawlPoll();
  } catch (err) {
    showToast('请求失败: ' + err.message, 'error');
    btn.disabled = false;
    btn.textContent = '提交';
  }
}

function startCrawlPoll() {
  const cs = document.getElementById('crawlStatus');
  cs.classList.add('active');
  stopCrawlPoll();

  crawlTimer = setInterval(async () => {
    try {
      const res = await fetch('/api/crawl/status');
      const data = await res.json();
      const text = document.getElementById('crawlText');
      const fill = document.getElementById('crawlFill');

      const total = data.total || 0;
      const done = data.done || data.current || 0;
      const pct = total > 0 ? (done / total * 100).toFixed(1) : 0;
      const status = data.status || '';

      text.textContent = status === 'done' || status === 'completed'
        ? '抓取完成 (' + done + '/' + total + ')'
        : '正在抓取... ' + done + '/' + total + ' (' + pct + '%)';
      fill.style.width = pct + '%';

      if (status === 'done' || status === 'completed' || status === 'error') {
        stopCrawlPoll();
        if (status === 'error') {
          text.textContent = '抓取出错: ' + (data.error || '未知错误');
          showToast('抓取出错', 'error');
        } else {
          showToast('抓取完成', 'success');
          loadBooks();
        }
        document.getElementById('btnSubmit').disabled = false;
        document.getElementById('btnSubmit').textContent = '提交';
      }
    } catch (err) {
      console.error('轮询失败:', err);
    }
  }, 1000);
}

function stopCrawlPoll() {
  if (crawlTimer) { clearInterval(crawlTimer); crawlTimer = null; }
}

/* ---- Keyboard ---- */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

/* ---- Init ---- */
loadBooks();
</script>
</body>
</html>
